<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="utf-8">
        <title>Painel teste</title>
        <link rel="stylesheet" th:href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    </head>
    <body class="container-mt-5">
        <h2> Painel de comandos</h2>
        <hr>
        
        <div th:if="${menssagem}" class="alert açert-success" th:text="${mensage}"></div>

        <div id="response-area" th:attr="hx-get=@{/agent/result}" hx-trigger="every 2s" hx-target="#response-area">
            <p th:text="@{response}">Aguardando resposta...</p>
        </div>

        <form action="agent/ask" method="post" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label for="task" class="form-label">Digite um comando aqui.</label>
                <textarea name="task" class="form-control" rows="3" rows="3" placeholder="Ex.: O que é um agente de IA?"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </body>
</html>
